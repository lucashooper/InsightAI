<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Your InsightAI Account</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .email-wrapper {
      width: 100%;
      background: #ffffff;
      padding: 60px 20px;
    }
    .email-container {
      max-width: 500px;
      margin: 0 auto;
      background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 100%);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }
    
    /* Logo Section */
    .logo-section {
      padding: 48px 40px 32px;
      text-align: center;
    }
    .logo-container {
      display: inline-block;
      margin-bottom: 24px;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto;
      display: block;
    }
    .brand-name {
      color: #ffffff;
      font-size: 24px;
      font-weight: 600;
      margin: 16px 0 0 0;
      letter-spacing: -0.5px;
    }
    
    /* Content Section */
    .email-content {
      padding: 0 40px 48px;
      text-align: center;
    }
    .greeting {
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
      margin: 0 0 16px 0;
      letter-spacing: -0.3px;
    }
    .message {
      font-size: 15px;
      line-height: 1.6;
      color: #d1d5db;
      margin: 0 0 32px 0;
    }
    
    /* CTA Button */
    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
      color: #ffffff !important;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
      transition: all 0.2s ease;
    }
    .cta-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
    }
    
    /* Footer */
    .footer {
      padding: 24px 40px;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .footer-text {
      font-size: 12px;
      color: #9ca3af;
      margin: 0;
      line-height: 1.6;
    }
    
    /* Mobile Responsive */
    @media only screen and (max-width: 600px) {
      .email-wrapper {
        padding: 40px 16px;
      }
      .email-container {
        border-radius: 12px;
      }
      .logo-section {
        padding: 40px 24px 24px;
      }
      .logo {
        width: 56px;
        height: 56px;
        font-size: 28px;
      }
      .brand-name {
        font-size: 20px;
      }
      .email-content {
        padding: 0 24px 40px;
      }
      .greeting {
        font-size: 20px;
      }
      .message {
        font-size: 14px;
      }
      .cta-button {
        padding: 12px 28px;
        font-size: 14px;
      }
      .footer {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <div class="email-container">
      
      <!-- Logo Section -->
      <div class="logo-section">
        <div class="logo-container">
          <img src="https://insight-ai-beta.netlify.app/Insight-logo.png" alt="InsightAI Logo" class="logo">
        </div>
        <h1 class="brand-name">InsightAI</h1>
      </div>

      <!-- Content -->
      <div class="email-content">
        <h2 class="greeting">Confirm Your Email</h2>
        
        <p class="message">
          Thanks for signing up! Click the button below to verify your email address and get started with your AI-powered journal.
        </p>

        <!-- CTA Button -->
        <a href="{{ .ConfirmationURL }}" class="cta-button">
          Confirm Email
        </a>
      </div>

      <!-- Footer -->
      <div class="footer">
        <p class="footer-text">
          © 2024 InsightAI. All rights reserved.
        </p>
      </div>
      
    </div>
  </div>
</body>
</html>
