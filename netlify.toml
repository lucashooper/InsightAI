# Netlify Configuration for InsightAI

# Build settings
[build]
  command = "npm run build"
  publish = "dist"
  
# Routing

# 1) Root serves marketing site landing page
[[redirects]]
  from = "/"
  to = "/marketing-dist/index.html"
  status = 200

# 2) Public legal/support pages
[[redirects]]
  from = "/privacy"
  to = "/marketing-dist/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/marketing-dist/terms.html"
  status = 200

[[redirects]]
  from = "/support"
  to = "/marketing-dist/support.html"
  status = 200

# 3) Login page - serves the web app (React Router handles /login route)
[[redirects]]
  from = "/login"
  to = "/index.html"
  status = 200

# 4) App shell under /app - SPA redirect so React Router works on refresh
#    Only /app/* falls back to index.html; static assets are still served directly.
[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200
  force = false

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
