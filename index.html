<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/pwa-icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a" />
    
    <!-- iOS Specific Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Insight" />
    <link rel="apple-touch-icon" href="/pwa-icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/pwa-icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/pwa-icons/icon-192.png" />
    
    <!-- Description for SEO -->
    <meta name="description" content="Insight - AI-powered emotional wellness journal and self-improvement tracker. Track your mood, gain insights, and improve your mental health." />
    <meta name="keywords" content="journal, diary, AI, mental health, wellness, mood tracker, self-improvement" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Insight - AI Journal & Diary" />
    <meta property="og:description" content="AI-powered emotional wellness journal and self-improvement tracker" />
    <meta property="og:image" content="/pwa-icons/icon-512.png" />
    
    <title>Insight - AI Journal & Diary</title>
    
    <!-- Prevent white flash on load -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #0a0a0a;
        color: #ffffff;
      }
      
      #root {
        min-height: 100vh;
        background-color: #0a0a0a;
      }
      
      /* Loading spinner animation */
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
